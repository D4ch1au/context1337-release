name: track-upstream

# Weekly: check wgpsec/context1337 + wgpsec/AboutSecurity for new commits. If
# either moved, bump pins.json, commit it, and trigger build-release. The release
# job's MCP verify gate is what protects against an upstream breaking change being
# published as a broken release — if verify fails, no release is cut.
on:
  schedule:
    - cron: "0 3 * * 1"   # 03:00 UTC every Monday
  workflow_dispatch: {}    # allow a manual upstream check

permissions:
  contents: write

jobs:
  check-and-bump:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.bump.outputs.changed }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Check upstream + bump pins.json
        id: bump
        run: |
          DATE=$(date -u +%Y-%m-%d)
          OUT=$(bun run bump-pins.ts --date="$DATE")
          echo "$OUT"
          CHANGED=$(echo "$OUT" | grep -oE 'changed=(true|false)' | cut -d= -f2)
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "tag=upstream-${DATE}-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Commit pins bump
        if: steps.bump.outputs.changed == 'true'
        run: |
          git config user.name "context1337-bot"
          git config user.email "context1337-bot@users.noreply.github.com"
          git add pins.json
          git commit -m "chore(pins): bump upstream context1337 / AboutSecurity ($(date -u +%Y-%m-%d))"
          git push

  release:
    needs: check-and-bump
    if: needs.check-and-bump.outputs.changed == 'true'
    uses: ./.github/workflows/build-release.yml
    with:
      tag: ${{ needs.check-and-bump.outputs.tag }}
    permissions:
      contents: write
